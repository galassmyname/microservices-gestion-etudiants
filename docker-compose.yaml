services:

  # ─── Base de données Student ───────────────────────────
  mysql-student:
    image: mysql:8
    container_name: mysql-student
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_db
    ports:
      - "3307:3306"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Base de données Course ────────────────────────────
  mysql-course:
    image: mysql:8
    container_name: mysql-course
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_db
    ports:
      - "3308:3306"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Base de données Teacher ───────────────────────────
  mysql-teacher:
    image: mysql:8
    container_name: mysql-teacher
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: teacher_db
    ports:
      - "3309:3306"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Student Service ───────────────────────────────────
  student-service:
    build:
      context: ./student-service/student-service
      dockerfile: Dockerfile
    container_name: student-service
    ports:
      - "8081:8081"
    depends_on:
      mysql-student:
        condition: service_healthy
    networks:
      - microservices-network

  # ─── Course Service ────────────────────────────────────
  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: course-service
    ports:
      - "8082:8082"
    depends_on:
      mysql-course:
        condition: service_healthy
      student-service:
        condition: service_started
      teacher-service:
        condition: service_started
    networks:
      - microservices-network

  # ─── Teacher Service ───────────────────────────────────
  teacher-service:
    build:
      context: ./teacher-service
      dockerfile: Dockerfile
    container_name: teacher-service
    ports:
      - "8083:8083"
    depends_on:
      mysql-teacher:
        condition: service_healthy
    networks:
      - microservices-network

  # ─── Frontend Angular ──────────────────────────────────
  frontend:
    build:
      context: ./frontend-microservices
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - student-service
      - course-service
      - teacher-service
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge
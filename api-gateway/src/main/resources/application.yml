server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:                          # ← clé obligatoire avec Spring Cloud 5.x
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: false

          routes:
            - id: student-service
              uri: http://localhost:8081
              predicates:
                - Path=/students/**

            - id: course-service
              uri: http://localhost:8082
              predicates:
                - Path=/courses/**

            - id: teacher-service
              uri: http://localhost:8083
              predicates:
                - Path=/teachers/**